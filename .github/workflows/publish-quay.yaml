name: Publish OCI image to Quay.io

on:
  push:
    branches: ["master"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack (Yarn)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build all workspaces
        run: yarn build:all

      - name: Choose dist directory
        id: choose
        shell: bash
        run: |
          set -euo pipefail
          candidates=("apps/agent-ui/dist" "apps/agent/dist" "apps/demo/dist")
          chosen=""
          for d in "${candidates[@]}"; do
            if [ -d "$d" ] && [ -n "$(ls -A "$d" 2>/dev/null)" ]; then
              chosen="$d"
              break
            fi
          done
          if [ -z "$chosen" ]; then
            echo "No dist directory found." >&2
            exit 1
          fi
          echo "dist_dir=$chosen" >> "$GITHUB_OUTPUT"
          echo "Using dist: $chosen"

      - name: Compute short SHA
        id: meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"

      - name: Login to Quay.io
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
        run: |
          echo "${QUAY_PASSWORD}" | docker login -u "${QUAY_USERNAME}" --password-stdin quay.io

      - name: Build image (FROM scratch, only dist/)
        env:
          IMAGE: ${{ secrets.QUAY_IMAGE }}
          DIST_DIR: ${{ steps.choose.outputs.dist_dir }}
        run: |
          docker build -t "${IMAGE}:latest" -f - "${DIST_DIR}" <<'EOF'
          FROM scratch
          COPY . /dist
          EOF

      - name: Tag image with commit SHA
        env:
          IMAGE: ${{ secrets.QUAY_IMAGE }}
          SHORT_SHA: ${{ steps.meta.outputs.short_sha }}
        run: |
          docker tag "${IMAGE}:latest" "${IMAGE}:${SHORT_SHA}"

      - name: Push images
        env:
          IMAGE: ${{ secrets.QUAY_IMAGE }}
          SHORT_SHA: ${{ steps.meta.outputs.short_sha }}
        run: |
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${SHORT_SHA}"


